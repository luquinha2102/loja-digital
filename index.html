<!DOCTYPE html>

<html lang="pt-br">
    <head>
        <meta charset="utf-8" />
        <meta 
            name="viewport" 
            content="width=device-width, initial-scale=1.0"
        />
        <title>Loja Digital - Cadastrar</title>
        <link 
            rel="stylesheet" 
            href="./style.css" 
        />
    </head>
    <body>
        <header>
            <a href="#">
                <img 
                    src="./assets/logo.svg" 
                    alt="logo da loja"
                />
                <span>Loja Digital</span>
            </a>
        </header>
        <main>
            <form >
                <div class="title">
                    <h1>Acesse sua conta</h1>
                    <p>Novo cliente? Então resgistre-se <a href="#">aqui.</a></p>
                </div>
                <div class="inputs">
                    <div>
                        <label>Email *</label>
                        <input 
                            type="email" 
                            placeholder="Digite seu email" required 
                            />
                    </div>
                    <div>
                        <label>Senha *</label>
                        <input 
                            type="password" 
                            placeholder="Digite sua senha" required 
                            />
                    </div>
                </div>
                <p><a href="#">Esqueceu sua senha?</a></p>
                <button>Acessar conta</button>
                <div class="others">
                    <p>Ou acesse com</p>
                    <ul>
                        <li>
                            <a href="#">
                                <img 
                                    src="./assets/gmail 1.svg" 
                                    alt="logo do gmail"
                                />
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img 
                                    src="./assets/Original.svg" 
                                    alt="logo do facebook"
                                />
                            </a>
                        </li>
                    </ul>
                </div>
            </form>
        </main>
    </body>
</html>
